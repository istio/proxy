bcr_test_module:
  module_path: "examples/bzlmod"
  matrix:
    platform: ["debian11", "macos", "ubuntu2204", "windows"]
    bazel: [7.*, 8.*, 9.*]
  tasks:
    run_tests:
      name: "Run test module"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_flags:
        # Minimum bazel supported C++
        - "--keep_going"
        - '--cxxopt=-std=c++17'
        - '--host_cxxopt=-std=c++17'
      build_targets:
        - "//..."
      test_targets:
        - "//..."
