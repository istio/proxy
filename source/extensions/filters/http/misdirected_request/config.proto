syntax = "proto3";

// $title: Misdirected request filter for HTTPS listeners sharing a port.
//
// Detects misdirected requests on HTTPS listeners that share a port (Gateway API
// "HTTPRouteHTTPSListenerDetectMisdirectedRequests" semantics) and returns HTTP
// 421 when the request's :authority is owned by a *different* listener than the
// one selected by SNI. Unknown hosts fall through to normal routing (HTTP 404).

package istio.envoy.config.filter.http.misdirected_request.v1alpha1;

option go_package = "istio.io/api/envoy/config/filter/http/misdirected_request/v1alpha1";

// FilterConfig is installed per HTTPS filter chain (one per SNI/listener). It is
// intentionally small: only this listener's own hostnames live in the per-chain
// config, while the full set of listener hostnames sharing the port is read once
// from shared listener metadata, keeping total config O(N) rather than O(N^2).
message FilterConfig {
  // Hostname patterns served by THIS listener (the filter chain this filter is
  // installed on). Each entry is an exact hostname ("a.example.com"), a single
  // wildcard ("*.example.com"), or "*" for a catch-all listener.
  repeated string own_hostnames = 1;

  // Name of the listener metadata namespace (the filter_metadata key on the
  // listener) holding the full set of listener hostname patterns sharing this
  // port. Defaults to "istio.misdirected_request" when empty.
  string listener_metadata_namespace = 2;

  // Name of the field, within the metadata struct named above, holding the
  // repeated list of all listener hostname patterns on this port. Defaults to
  // "hosts" when empty.
  string hosts_field = 3;
}
